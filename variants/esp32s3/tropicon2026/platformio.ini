[env:tropicon2026]
extends = esp32s3_base
board = esp32-s3-devkitc-1
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB

build_flags =
    ${esp32s3_base.build_flags}
    -DTROPICON2026
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_SX1262
    -I variants/esp32s3/tropicon2026
    -I variants/esp32s3/tropicon2026/SI4463

    # === FLAGS FOR THE TELEMETRY ===
    # Force-enable environmental telemetry at compile time (bypasses app config requirement).
    # Without this, the module is disabled unless explicitly enabled from the Meshtastic app.
    -DENVIRONMENTAL_TELEMETRY_MODULE_ENABLE=1
    -DUSE_AIS
    # ======================================

    # === RAM diet — shrink queues sized for phone-scale deployments ===
    # Packet pool = (MAX_RX_TOPHONE + 4 + 2*MAX_TX_QUEUE + 2) * 381 B
    # Defaults on S3: 32 + 4 + 32 + 2 = 70 packets ≈ 26 KB. With these: 8 + 4 + 16 + 2 = 30 ≈ 11 KB.
    -DMAX_RX_TOPHONE=8
    -DMAX_TX_QUEUE=8

    # === Disable modules we don't ship on the badge ===
    # No phone app → MQTT/WebServer unused. No WiFi proximity sensing → Paxcounter.
    # No store-and-forward role. No SX1280 audio codec. No tactical/range/trace features.
    -DMESHTASTIC_EXCLUDE_MQTT=1
    -DMESHTASTIC_EXCLUDE_WEBSERVER=1
    -DMESHTASTIC_EXCLUDE_PAXCOUNTER=1
    -DMESHTASTIC_EXCLUDE_STOREFORWARD=1
    -DMESHTASTIC_EXCLUDE_AUDIO=1
    -DMESHTASTIC_EXCLUDE_ATAK=1
    -DMESHTASTIC_EXCLUDE_RANGETEST=1
    -DMESHTASTIC_EXCLUDE_TRACEROUTE=1
    -DMESHTASTIC_EXCLUDE_WAYPOINT=1
    -DMESHTASTIC_EXCLUDE_DETECTIONSENSOR=1
    -DMESHTASTIC_EXCLUDE_NEIGHBORINFO=1
    -DMESHTASTIC_EXCLUDE_EXTERNALNOTIFICATION=1
    # Disables Meshtastic's UART passthrough *module* only — does NOT touch
    # Serial.print() calls or USB CDC console.
    -DMESHTASTIC_EXCLUDE_SERIAL=1

    # === Smaller runtime buffers ===
    -DMESSAGE_HISTORY_LIMIT=10
    -DSERIAL_BUFFER_SIZE=1024

build_src_filter =
    ${esp32s3_base.build_src_filter}
    +<../variants/esp32s3/tropicon2026/*.cpp>
    +<../variants/esp32s3/tropicon2026/SI4463/*.cpp>
    +<../variants/esp32s3/tropicon2026/AIS/*.cpp>
    +<../src/graphics/draw/TalksRenderer.cpp>
    +<../src/graphics/draw/AISRenderer.cpp>

lib_deps = ${esp32s3_base.lib_deps}
  # renovate: datasource=git-refs depName=meshtastic-Arduino_GFX packageName=https://github.com/meshtastic/Arduino_GFX gitBranch=master
  https://github.com/meshtastic/Arduino_GFX/archive/054e81ffaf23784830a734e3c184346789349406.zip
  # renovate: datasource=custom.pio depName=ArduinoJson packageName=bblanchon/library/ArduinoJson
  bblanchon/ArduinoJson@^7.3.1